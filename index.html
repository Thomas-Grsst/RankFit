<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RankFit · Ton rang sur chaque exercice</title>
  <meta name="description" content="Découvre ton rang (Bronze à Olympien) sur chaque exercice, ajusté à ton sexe, ton poids et ta taille." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Filet de sécurité : si une erreur JS survient, on l'affiche
       au lieu de laisser un écran noir. -->
  <script>
    window.addEventListener("error", function (e) {
      var app = document.getElementById("app");
      if (app && !app.children.length) {
        app.innerHTML =
          '<div style="max-width:560px;margin:60px auto;padding:24px;font-family:system-ui;' +
          'background:#171d26;color:#e7ecf2;border:1px solid #262e3a;border-radius:14px">' +
          '<h2 style="margin:0 0 8px">Une erreur est survenue</h2>' +
          '<p style="color:#8b97a7">' + (e.message || e.error) + '</p>' +
          '<p style="color:#8b97a7;font-size:.9rem">Vérifie <code>js/config.js</code> ' +
          '(URL du projet et clé). Ouvre la console (F12) pour le détail.</p></div>';
      }
    });
  </script>

  <!-- Supabase JS (utilisé uniquement si les clés sont configurées) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Scripts de l'application (ordre important) -->
  <script src="js/config.js"></script>
  <script src="js/ranks.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/body.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
